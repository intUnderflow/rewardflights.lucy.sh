name: Process reward-flight data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: process-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo (processor source)
        uses: actions/checkout@v4

      - name: Checkout source data (intUnderflow/rewardflights)
        uses: actions/checkout@v4
        with:
          repository: intUnderflow/rewardflights
          path: rewardflights-src
          fetch-depth: 1

      - name: Checkout derived data repo
        uses: actions/checkout@v4
        with:
          repository: intUnderflow/rewardflights.lucy.sh-data
          path: data-out
          token: ${{ secrets.DATA_REPO_TOKEN }}
          fetch-depth: 1

      - name: Skip if source unchanged
        id: skip
        run: |
          src_sha="$(git -C rewardflights-src rev-parse HEAD)"
          have_sha="$(grep -o '"v":"[0-9a-f]*"' data-out/manifest.json 2>/dev/null | cut -d'"' -f4 || true)"
          echo "src_sha=$src_sha" >> "$GITHUB_OUTPUT"
          if [ "$src_sha" = "$have_sha" ]; then
            echo "Source $src_sha already processed; skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.skip.outputs.changed == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: processor/go.mod
          # stdlib-only module: no go.sum to key a module cache on
          cache: false

      - name: Run processor
        if: steps.skip.outputs.changed == 'true'
        working-directory: processor
        run: |
          go run . \
            -src "$GITHUB_WORKSPACE/rewardflights-src" \
            -out "$GITHUB_WORKSPACE/data-out"

      - name: Determinism canary
        if: steps.skip.outputs.changed == 'true'
        working-directory: processor
        run: |
          # A second run over identical inputs must change nothing; if it
          # does, the encoder is nondeterministic and committing would smear
          # churn across the whole derived tree.
          out="$(go run . \
            -src "$GITHUB_WORKSPACE/rewardflights-src" \
            -out "$GITHUB_WORKSPACE/data-out" | tee /dev/stderr)"
          echo "$out" | grep -q "written=0 deleted=0" || {
            echo "::error::Processor output is nondeterministic; refusing to commit."
            exit 1
          }

      - name: Commit and push derived data
        if: steps.skip.outputs.changed == 'true'
        working-directory: data-out
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No derived-data changes."
            exit 0
          fi
          git config user.name "rewardflights-processor[bot]"
          git config user.email "processor@rewardflights.lucy.sh"
          git add -A
          short_sha="$(echo '${{ steps.skip.outputs.src_sha }}' | cut -c1-9)"
          git commit -m "data: source $short_sha"
          git push
