name = "rewardflights-push"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Subscription store. Create with:
#   wrangler kv namespace create SUBS
# then paste the id below.
[[kv_namespaces]]
binding = "SUBS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secret (NOT stored here — set once with `wrangler secret put PULL_SECRET`):
#   PULL_SECRET  shared bearer token the alert sender uses to read subscriptions
#
# Optional custom domain: add a route in the Cloudflare dashboard, e.g.
#   push.rewardflights.lucy.sh/*
# Otherwise the default *.workers.dev URL works fine — put whichever you use
# into PUSH_API in site/app.js.
